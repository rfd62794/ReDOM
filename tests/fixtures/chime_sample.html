<!DOCTYPE html>
<html>
<head>
    <title>Chime Transactions</title>
</head>
<body>
    <div class="transaction-list">
        <h2>Yesterday</h2>
        <div class="transaction">
            <span class="desc">Starbucks Coffee</span>
            <span class="amount">-$5.67</span>
        </div>
        <div class="transaction">
            <span class="desc">Grocery Store</span>
            <span class="amount">-$42.13</span>
        </div>
        
        <h2>Thursday, April 9th</h2>
        <div class="transaction">
            <span class="desc">Gas Station</span>
            <span class="amount">-$35.00</span>
        </div>
        <div class="transaction">
            <span class="desc">Direct Deposit</span>
            <span class="amount">+$1,250.00</span>
        </div>
        
        <h2>Tuesday, March 31st</h2>
        <div class="transaction">
            <span class="desc">Electric Bill</span>
            <span class="amount">-$89.50</span>
        </div>
        
        <!-- Record with no preceding header for unresolved test -->
        <div class="transaction orphan-record">
            <span class="desc">Mystery Charge</span>
            <span class="amount">-$12.99</span>
        </div>
    </div>
</body>
</html>
